<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Professor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Register New Professor</h2>
        <form id="professorForm">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellidos" placeholder="Apellidos" required>
            <input type="text" id="cedula" placeholder="Cédula" required>
            <input type="number" id="edad" placeholder="Edad" required>
            
            <button type="submit" class="btn btn-primary">Save Professor</button>
            <a href="index.html" class="btn" style="background: #ccc; text-decoration: none; display: inline-block; padding: 10px; border-radius: 4px; color: black;">Back to List</a>
        </form>
    </div>

    <script>
        // 1. VERIFICACIÓN DE TOKEN 
        const token = sessionStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }

        document.getElementById('professorForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const data = {
                nombre: document.getElementById('nombre').value,
                apellidos: document.getElementById('apellidos').value,
                cedula: document.getElementById('cedula').value,
                edad: document.getElementById('edad').value
            };
            
            try {
                const response = await fetch('http://localhost:4000/professors', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Professor saved successfully!');
                    window.location.href = 'index.html';
                } else {
                    const errorData = await response.json();
                    alert('Error: ' + (errorData.message || 'Check if ID is duplicate or token is expired.'));
                    
                    if (response.status === 401 || response.status === 400) {
                        sessionStorage.clear();
                        window.location.href = 'login.html';
                    }
                }
            } catch (error) {
                console.error('Fetch error:', error);
                alert('Connection error with the server.');
            }
        };
    </script>
</body>
</html>
